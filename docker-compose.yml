services:
  # ── 1. Edge Proxy Declarativo ─────────────────────────────
  edge-proxy:
    image: nginx:1.27-alpine
    container_name: tensor-aurora-edge-proxy
    depends_on:
      glpi-backend:
        condition: service_healthy
      glpi-frontend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:uid=101,gid=101,mode=1777
      - /var/cache/nginx:uid=101,gid=101,mode=0755
    user: "101:101"
    init: true
    security_opt:
      - no-new-privileges:true
    networks:
      - apps-rede

  # ── 2. Aplicação: Backend (FastAPI) ────────────────────────
  glpi-backend:
    build: .
    container_name: glpi-universal-backend
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - LOCAL_STATE_DB_PATH=/app/data/local_state.db
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    expose:
      - "8080"
    volumes:
      - backend_state:/app/data
    networks:
      - apps-rede

  # ── 3. Aplicação: Frontend (Next.js) ───────────────────────
  glpi-frontend:
    build: 
      context: ./web
    container_name: glpi-tensor-frontend
    environment:
      - HOST=0.0.0.0
      - INTERNAL_API_URL=http://glpi-backend:8080
    restart: unless-stopped
    depends_on:
      glpi-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    init: true
    security_opt:
      - no-new-privileges:true
    expose:
      - "3000"
    networks:
      - apps-rede

# ── Redes ──────────────────────────────────────────────────
networks:
  apps-rede:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────
volumes:
  backend_state:
