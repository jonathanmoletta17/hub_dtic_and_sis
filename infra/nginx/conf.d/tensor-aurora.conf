resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 8080;
    server_name hub.local;

    client_max_body_size 64m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location /api/ {
        set $backend_upstream http://glpi-universal-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass $backend_upstream;
    }

    location / {
        set $frontend_upstream http://glpi-tensor-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass $frontend_upstream;
    }
}

server {
    listen 8080;
    server_name carregadores.local;

    return 308 http://hub.local:8080$request_uri;
}

server {
    listen 8080;
    server_name api.carregadores.local;

    return 308 http://api.hub.local:8080$request_uri;
}

server {
    listen 8080;
    server_name api.hub.local;

    client_max_body_size 64m;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        set $backend_upstream http://glpi-universal-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass $backend_upstream;
    }
}
